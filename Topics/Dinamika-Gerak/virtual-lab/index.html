<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard: Dinamika Gerak</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .header-top {
            display: flex;
            justify-content: flex-end;
            padding: 10px 20px;
        }
        .btn-guru {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .btn-guru:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .btn-guru.active {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
        }
        
        .guru-controls {
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .guru-controls label {
            font-size: 0.9rem;
            color: #cbd5e1;
        }
        
        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #475569;
            transition: .4s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 2px; bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(20px); }

        .module-card { cursor: pointer; }
        .module-card.locked { cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="header-top">
        <button id="btnGuru" class="btn-guru">⚙️ Mode Guru</button>
    </div>

    <header class="dashboard-header">
        <h1>Dinamika Gerak</h1>
        <p>Laboratorium Virtual Interaktif Fisika SMA. Pilih modul pertemuan di bawah ini untuk memulai eksperimen Anda.</p>
    </header>

    <main class="dashboard-grid" id="cardContainer">
        <!-- Cards will be generated by JS -->
    </main>

    <script>
        const modules = [
            { id: 'p1', title: 'Pertemuan 1', icon: '🍎', desc: 'Konsep gaya, jenis gaya, resultan gaya, dan eksplorasi Hukum I Newton.', path: 'scenes/hukum-newton-1/index.html' },
            { id: 'p2', title: 'Pertemuan 2', icon: '🚀', desc: 'Hukum II Newton, Kerangka Acuan, dan Hukum III Newton (Aksi-Reaksi).', path: 'scenes/hukum-newton-2/index.html' },
            { id: 'p3', title: 'Pertemuan 3', icon: '🧲', desc: 'Jenis-jenis Gaya Spesifik: Normal, Berat, Gesek, Gravitasi, Tegangan Tali, dll.', path: 'scenes/hukum-newton-3/index.html' },
            { id: 'p4', title: 'Pertemuan 4', icon: '📐', desc: 'Analisis gerak dan gaya pada lintasan Bidang Miring.', path: 'scenes/bidang-miring/index.html' },
            { id: 'p5', title: 'Pertemuan 5', icon: '⚙️', desc: 'Sistem Tegangan Tali dan Aplikasi Katrol Kompleks (Mesin Atwood).', path: 'scenes/katrol/index.html' },
            { id: 'p6', title: 'Pertemuan 6', icon: '⚖️', desc: 'Kesetimbangan Partikel (ΣF = 0) dalam dua dimensi.', path: 'scenes/kesetimbangan/index.html' },
            { id: 'p7', title: 'Pertemuan 7', icon: '🎬', desc: 'Presentasi Projek Kelompok & Penilaian Akhir Materi Dinamika Gerak.', path: 'scenes/projek/index.html' }
        ];

        let isGuruMode = false;
        
        // Initialize access from localStorage
        let accessData = JSON.parse(localStorage.getItem('dinamika_gerak_access'));
        if (!accessData) {
            accessData = ['p1', 'p2']; // Default open
            localStorage.setItem('dinamika_gerak_access', JSON.stringify(accessData));
        }

        const container = document.getElementById('cardContainer');
        const btnGuru = document.getElementById('btnGuru');

        function toggleAccess(id) {
            if (accessData.includes(id)) {
                accessData = accessData.filter(i => i !== id);
            } else {
                accessData.push(id);
            }
            localStorage.setItem('dinamika_gerak_access', JSON.stringify(accessData));
            renderCards();
        }

        function renderCards() {
            container.innerHTML = '';
            
            modules.forEach(mod => {
                const isUnlocked = accessData.includes(mod.id);
                
                const card = document.createElement('div');
                card.className = `module-card ${!isUnlocked && !isGuruMode ? 'locked' : ''}`;
                
                card.onclick = (e) => {
                    // Prevent navigation if clicking inside guru controls
                    if (e.target.closest('.guru-controls')) return;
                    
                    if (isUnlocked || isGuruMode) {
                        window.location.href = mod.path;
                    } else {
                        alert('Modul ini dikunci oleh Guru!');
                    }
                };

                let badgeHTML = '';
                if (isUnlocked) {
                    badgeHTML = `<div class="status-badge ready">Mulai Eksperimen</div>`;
                } else {
                    badgeHTML = `<div class="status-badge locked">🔒 Terkunci</div>`;
                }

                let guruControlsHTML = '';
                if (isGuruMode) {
                    guruControlsHTML = `
                        <div class="guru-controls">
                            <label>Akses Siswa</label>
                            <label class="switch">
                                <input type="checkbox" ${isUnlocked ? 'checked' : ''} onchange="toggleAccess('${mod.id}')">
                                <span class="slider"></span>
                            </label>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="card-icon">${mod.icon}</div>
                    <h2 class="card-title">${mod.title}</h2>
                    <p class="card-desc">${mod.desc}</p>
                    ${badgeHTML}
                    ${guruControlsHTML}
                `;
                
                container.appendChild(card);
            });
        }

        btnGuru.addEventListener('click', () => {
            if (!isGuruMode) {
                const pin = prompt("Masukkan PIN Guru:");
                if (pin === "1234") {
                    isGuruMode = true;
                    btnGuru.textContent = "Keluar Mode Guru";
                    btnGuru.classList.add('active');
                    renderCards();
                } else if (pin !== null) {
                    alert("PIN Salah!");
                }
            } else {
                isGuruMode = false;
                btnGuru.textContent = "⚙️ Mode Guru";
                btnGuru.classList.remove('active');
                renderCards();
            }
        });

        // Initial render
        renderCards();

    </script>
</body>
</html>
